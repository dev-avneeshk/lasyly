name: Scrape ESPN News (Every 30 min)

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:

jobs:
  scrape-news:
    name: ESPN News Feed
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Create .env.local for scraper
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" > .env.local
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env.local

      - name: Scrape ESPN news
        run: python scripts/scrape_espn_news.py
        timeout-minutes: 10

      - name: Upload scraper logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: espn-news-logs-${{ github.run_number }}
          path: scripts/logs/espn_news_scraper.log
          retention-days: 1
