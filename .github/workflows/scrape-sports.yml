name: Scrape Sports Stats (Every 12h)

# Runs at midnight and noon UTC every day.
# Covers NBA box scores + season stats, tennis tournaments, and ESPN
# teams/rosters/standings/player stats.
# News is handled separately in scrape-news.yml (every 30 min).
# Live scores are handled in scrape-live-scores.yml (every 10 min).

on:
  schedule:
    - cron: '0 0,12 * * *'  # 00:00 and 12:00 UTC
  workflow_dispatch:

jobs:
  # ─── 1. NBA ──────────────────────────────────────────────────────────────────
  scrape-nba:
    name: NBA — Box Scores + Season Stats + Team Stats
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Create .env.local
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" > .env.local
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env.local

      - name: Daily schedule + latest box scores
        run: python scripts/scrape_nba.py daily --delay 3
        timeout-minutes: 45

      - name: Backfill any missing box scores (last 20)
        run: python scripts/scrape_nba.py boxscores-only --limit 20 --delay 3
        timeout-minutes: 30

      - name: All team stats (9 table views, team + opponent)
        run: python scripts/scrape_team_stats.py --delay 3
        timeout-minutes: 15

      - name: All player season stats (6 pages, regular + playoffs)
        run: python scripts/scrape_player_stats.py --delay 3
        timeout-minutes: 20

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nba-scraper-logs-${{ github.run_number }}
          path: |
            scripts/logs/
          retention-days: 7

  # ─── 2. Tennis ───────────────────────────────────────────────────────────────
  scrape-tennis:
    name: Tennis — Active Tournaments
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Create .env.local
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" > .env.local
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env.local

      - name: Discover active tournaments
        id: discover
        run: |
          TOURNAMENTS=$(python scripts/discover_tournaments.py 2>/dev/null || echo "")
          if [ -z "$TOURNAMENTS" ]; then
            echo "No active tournaments found — skipping."
            echo "found=false" >> $GITHUB_OUTPUT
          else
            echo "Active tournaments:"
            echo "$TOURNAMENTS"
            echo "$TOURNAMENTS" > /tmp/tournaments.txt
            echo "found=true" >> $GITHUB_OUTPUT
          fi

      - name: Scrape each tournament (matches + player stats)
        if: steps.discover.outputs.found == 'true'
        run: |
          while IFS= read -r url; do
            [ -z "$url" ] && continue
            echo "=== Scraping: $url ==="
            python scripts/scrape_tennis.py daily --tournament "$url" --delay 3 --limit 30 || true
            sleep 5
          done < /tmp/tournaments.txt

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tennis-scraper-logs-${{ github.run_number }}
          path: scripts/logs/
          retention-days: 7

  # ─── 3. ESPN (all non-NBA sports) ────────────────────────────────────────────
  scrape-espn:
    name: ESPN — Soccer, NFL, NHL, Tennis, F1 (Teams + Rosters + Standings + Stats)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Create .env.local
        run: |
          echo "NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" > .env.local
          echo "SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" >> .env.local

      - name: Refresh teams (fast, idempotent)
        run: python scripts/scrape_espn.py teams --delay 1
        timeout-minutes: 10

      - name: Refresh standings
        run: python scripts/scrape_espn.py standings --delay 1
        timeout-minutes: 10

      - name: Recent player stats — NHL
        run: python scripts/scrape_espn.py stats --league nhl --delay 1 --limit 20
        timeout-minutes: 15

      - name: Recent player stats — all other sports
        run: python scripts/scrape_espn.py stats --delay 1 --limit 40
        timeout-minutes: 30

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: espn-scraper-logs-${{ github.run_number }}
          path: scripts/logs/espn_scraper.log
          retention-days: 7
